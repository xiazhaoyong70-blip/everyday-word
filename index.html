<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日诗意 · 心灵寄语</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Serif SC', serif;
            overflow: hidden;
            position: relative;
            transition: background-image 1s ease-in-out;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
            z-index: 1;
            transition: background 1s ease-in-out;
        }

        .background-overlay.light {
            background: rgba(255, 255, 255, 0.2);
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .date-section {
            text-align: center;
            color: white;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        }

        .date-day {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 4px;
            margin-bottom: 8px;
            opacity: 0.95;
        }

        .date-full {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 2px;
            opacity: 0.85;
        }

        .card {
            width: 480px;
            min-height: 380px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 20px 60px -10px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            padding: 50px 45px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2), transparent);
            border-radius: 32px 32px 0 0;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 
                0 30px 80px -10px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset;
        }

        .card.flipping {
            animation: flip 0.6s ease-in-out;
        }

        @keyframes flip {
            0% { transform: rotateY(0deg) scale(1); }
            50% { transform: rotateY(90deg) scale(0.95); opacity: 0.6; }
            100% { transform: rotateY(0deg) scale(1); }
        }

        .emoji-decoration {
            text-align: center;
            font-size: 56px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .quote-content {
            text-align: center;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .quote-text {
            font-size: 26px;
            line-height: 1.8;
            color: white;
            font-weight: 500;
            letter-spacing: 2px;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
            max-width: 100%;
        }

        .quote-author {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 25px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .hint {
            text-align: center;
            margin-top: 35px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .hint-icon {
            animation: pulse 2s infinite;
            font-size: 16px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .footer {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }

        .footer-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 3px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .background-indicator {
            position: fixed;
            bottom: 100px;
            right: 30px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .indicator-dot.active {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.3);
        }

        .indicator-dot:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        @media (max-width: 520px) {
            .card {
                width: 90vw;
                min-height: 340px;
                padding: 40px 30px;
            }

            .quote-text {
                font-size: 20px;
            }

            .emoji-decoration {
                font-size: 48px;
            }

            .date-day {
                font-size: 22px;
            }

            .date-full {
                font-size: 16px;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <div class="background-overlay" id="overlay"></div>

    <div class="container">
        <div class="date-section">
            <div class="date-day" id="dayOfWeek">星期一</div>
            <div class="date-full" id="fullDate">2024年1月1日</div>
        </div>

        <div class="card" id="quoteCard">
            <div class="emoji-decoration" id="emoji">✨</div>
            
            <div class="quote-content">
                <div class="quote-text" id="quoteText">点击卡片，开启今日的诗意</div>
                <div class="quote-author" id="quoteAuthor"></div>
            </div>
            
            <div class="hint">
                <span class="hint-icon">👆</span>
                <span>点击切换心灵寄语</span>
            </div>
        </div>
    </div>

    <div class="background-indicator" id="indicator"></div>

    <div class="footer">
        <div class="footer-text">愿每一句话语，都能温暖你的心灵 💫</div>
    </div>

    <script>
        const quotes = [
            { text: "星光不问赶路人，时光不负有心人", author: "佚名", emoji: "⭐" },
            { text: "愿你眼中有星辰，心中有山海", author: "佚名", emoji: "🌟" },
            { text: "生活明朗，万物可爱", author: "季羡林", emoji: "🌸" },
            { text: "凡是过往，皆为序章", author: "莎士比亚", emoji: "📖" },
            { text: "心有猛虎，细嗅蔷薇", author: "萨松", emoji: "🐯" },
            { text: "岁月极美，在于它必然的流逝", author: "三毛", emoji: "🍂" },
            { text: "愿你一生努力，一生被爱", author: "八月长安", emoji: "💝" },
            { text: "人生如逆旅，我亦是行人", author: "苏轼", emoji: "🚶" },
            { text: "且将新火试新茶，诗酒趁年华", author: "苏轼", emoji: "🍵" },
            { text: "愿你出走半生，归来仍是少年", author: "孙光曼", emoji: "少年" },
            { text: "世间所有的相遇，都是久别重逢", author: "王家卫", emoji: "🤝" },
            { text: "愿你被这个世界温柔以待", author: "佚名", emoji: "🤗" },
            { text: "山有木兮木有枝，心悦君兮君不知", author: "《越人歌》", emoji: "🌳" },
            { text: "面朝大海，春暖花开", author: "海子", emoji: "🌊" },
            { text: "你若盛开，清风自来", author: "三毛", emoji: "🌺" },
            { text: "岁月静好，现世安稳", author: "胡兰成", emoji: "☕" },
            { text: "愿你历尽千帆，不染岁月风尘", author: "佚名", emoji: "⛵" },
            { text: "生活不止眼前的苟且，还有诗和远方", author: "高晓松", emoji: "🎨" },
            { text: "愿你的生活常温暖，日子总是温柔又闪光", author: "佚名", emoji: "☀️" },
            { text: "世间美好与你环环相扣", author: "柏松", emoji: "💫" },
            { text: "保持热爱，奔赴山海", author: "佚名", emoji: "🏔️" },
            { text: "慢慢来，谁还没有一个努力的过程", author: "佚名", emoji: "🌱" },
            { text: "愿你以渺小启程，以伟大结束", author: "佚名", emoji: "🦋" },
            { text: "前路浩浩荡荡，万事尽可期待", author: "佚名", emoji: "🌈" },
            { text: "你要悄悄拔尖，然后惊艳所有人", author: "佚名", emoji: "💎" },
            { text: "追光的人，终会光芒万丈", author: "佚名", emoji: "✨" },
            { text: "熬过无人问津的日子，才有诗和远方", author: "佚名", emoji: "🌙" },
            { text: "知足且上进，温柔而坚定", author: "佚名", emoji: "🌻" },
            { text: "愿你所求皆如愿，所行化坦途", author: "《Birthday》", emoji: "🎈" },
            { text: "山高路远，看世界，也找自己", author: "佚名", emoji: "🗺️" },
            { text: "不必借光而行，你我亦是星辰", author: "佚名", emoji: "🌠" },
            { text: "热爱可抵岁月漫长", author: "佚名", emoji: "❤️" },
            { text: "愿日子清净，抬头遇见的都是柔情", author: "佚名", emoji: "🌼" },
            { text: "万物皆有裂痕，那是光照进来的地方", author: "莱昂纳德·科恩", emoji: "🌅" },
            { text: "愿你一生清澈明朗，做你愿意做的事", author: "佚名", emoji: "💎" },
            { text: "生活原本沉闷，但跑起来就有风", author: "佚名", emoji: "🏃" },
            { text: "愿你眼里有光，心中有爱", author: "佚名", emoji: "💫" },
            { text: "慢慢来，好戏都在烟火里", author: "佚名", emoji: "🎆" },
            { text: "愿你我都能在鸡零狗碎里找到闪闪的快乐", author: "佚名", emoji: "✨" },
            { text: "日子很长，过客很多，也不必太在意", author: "佚名", emoji: "🍃" }
        ];

        const backgrounds = [
            { url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80', light: false },
            { url: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1920&q=80', light: false },
            { url: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1920&q=80', light: false },
            { url: 'https://images.unsplash.com/photo-1518173946687-a4c036bc1c9a?w=1920&q=80', light: false },
            { url: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1920&q=80', light: false },
            { url: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1920&q=80', light: false },
            { url: 'https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=1920&q=80', light: false },
            { url: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=1920&q=80', light: false },
            { url: 'https://images.unsplash.com/photo-1505144808419-1957a94ca61e?w=1920&q=80', light: true },
            { url: 'https://images.unsplash.com/photo-1507400492013-162706c8c05e?w=1920&q=80', light: false },
            { url: 'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920&q=80', light: false },
            { url: 'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=1920&q=80', light: false }
        ];

        let currentQuoteIndex = -1;
        let currentBgIndex = -1;
        let loadedImages = 0;

        const card = document.getElementById('quoteCard');
        const quoteText = document.getElementById('quoteText');
        const quoteAuthor = document.getElementById('quoteAuthor');
        const emojiEl = document.getElementById('emoji');
        const dayOfWeek = document.getElementById('dayOfWeek');
        const fullDate = document.getElementById('fullDate');
        const overlay = document.getElementById('overlay');
        const indicator = document.getElementById('indicator');
        const loading = document.getElementById('loading');

        function initDate() {
            const now = new Date();
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const months = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            
            dayOfWeek.textContent = days[now.getDay()];
            fullDate.textContent = `${now.getFullYear()}年${months[now.getMonth()]}${now.getDate()}日`;
        }

        function createIndicator() {
            indicator.innerHTML = '';
            backgrounds.forEach((bg, index) => {
                const dot = document.createElement('div');
                dot.className = 'indicator-dot';
                if (index === currentBgIndex) {
                    dot.classList.add('active');
                }
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    changeBackground(index);
                });
                indicator.appendChild(dot);
            });
        }

        function updateIndicator() {
            const dots = indicator.querySelectorAll('.indicator-dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentBgIndex);
            });
        }

        function preloadImages() {
            backgrounds.forEach((bg, index) => {
                const img = new Image();
                img.onload = () => {
                    loadedImages++;
                    if (loadedImages === backgrounds.length) {
                        setTimeout(() => {
                            loading.classList.add('hidden');
                        }, 500);
                    }
                };
                img.onerror = () => {
                    loadedImages++;
                    if (loadedImages === backgrounds.length) {
                        setTimeout(() => {
                            loading.classList.add('hidden');
                        }, 500);
                    }
                };
                img.src = bg.url;
            });
        }

        function changeBackground(index) {
            if (index !== undefined) {
                currentBgIndex = index;
            } else {
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * backgrounds.length);
                } while (newIndex === currentBgIndex && backgrounds.length > 1);
                currentBgIndex = newIndex;
            }
            
            const bg = backgrounds[currentBgIndex];
            document.body.style.backgroundImage = `url(${bg.url})`;
            
            if (bg.light) {
                overlay.classList.add('light');
            } else {
                overlay.classList.remove('light');
            }
            
            updateIndicator();
        }

        function getRandomQuote() {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * quotes.length);
            } while (newIndex === currentQuoteIndex && quotes.length > 1);
            
            currentQuoteIndex = newIndex;
            return quotes[newIndex];
        }

        function showQuote() {
            const quote = getRandomQuote();
            
            card.classList.add('flipping');
            
            setTimeout(() => {
                quoteText.textContent = quote.text;
                quoteAuthor.textContent = `—— ${quote.author}`;
                emojiEl.textContent = quote.emoji;
                
                quoteText.classList.add('fade-in');
                quoteAuthor.classList.add('fade-in');
                emojiEl.classList.add('fade-in');
                
                setTimeout(() => {
                    quoteText.classList.remove('fade-in');
                    quoteAuthor.classList.remove('fade-in');
                    emojiEl.classList.remove('fade-in');
                }, 500);
            }, 300);
            
            setTimeout(() => {
                card.classList.remove('flipping');
            }, 600);

            changeBackground();
        }

        card.addEventListener('click', showQuote);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                showQuote();
            }
        });

        let touchStartY = 0;
        card.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });

        card.addEventListener('touchend', (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            if (Math.abs(touchEndY - touchStartY) < 50) {
                showQuote();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            initDate();
            preloadImages();
            createIndicator();
            changeBackground();
            showQuote();
        });

        setInterval(initDate, 60000);
    </script>
</body>
</html>
